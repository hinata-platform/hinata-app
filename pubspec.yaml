name: hinata
description: "Hinata - open source, self-hosted project management."
publish_to: 'none'

version: 4.3.2+46

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Clean (path-based) URLs for Flutter web (no /#/ in the address bar)
  flutter_web_plugins:
    sdk: flutter

  # State management (Bloc family)
  bloc: ^9.1.0
  flutter_bloc: ^9.1.0
  hydrated_bloc: ^10.1.0
  bloc_concurrency: ^0.3.0
  replay_bloc: ^0.3.0
  equatable: ^2.0.7

  # Routing
  go_router: ^16.0.0

  # Networking & storage
  dio: ^5.7.0
  shared_preferences: ^2.3.0
  path_provider: ^2.1.0

  # Internationalization (i18next)
  i18next: ^0.9.0
  intl: any

  # UX
  animations: ^2.0.11
  wolt_modal_sheet: ^0.11.0
  fl_chart: ^1.1.1

  # Liquid Glass UI (vendored source under packages/ — full control, MIT)
  liquid_glass_widgets:
    path: packages/liquid_glass_widgets

  # Reporting / export
  pdf: ^3.11.0
  # >=5.15.0 loads pdf.js as an ES module (dynamic import of pdf.min.mjs); the
  # exact pdf.js version is pinned in web/index.html via dartPdfJsVersion so that
  # JPEG2000 images decode without the OpenJPEG WASM that pdf.js 5+ requires.
  printing: ^5.15.0
  flutter_svg: ^2.0.10

  # QR matrix generation for 2FA enrolment (pure-Dart; painted via CustomPainter)
  qr: ^3.0.0

  # Platform integration
  url_launcher: ^6.3.0
  app_links: ^6.3.0
  # High-refresh-rate (90/120 Hz) on Android. Android renders the Flutter surface
  # at the panel's *default* mode (usually 60 Hz) unless the app explicitly opts
  # into the highest supported mode, which is why static screens sit at 60 Hz
  # while continuous animations opportunistically boost to 120. iOS/macOS are
  # already covered by CADisableMinimumFrameDurationOnPhone in Info.plist.
  flutter_displaymode: ^0.6.0
  package_info_plus: ^9.0.0
  # Browser download (Blob + anchor) for authenticated file downloads on web.
  web: ^1.1.0

  # Attachments: native file picker + desktop drag-and-drop + photo/video gallery
  # & camera capture (image_picker drives the gallery/camera source on mobile).
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  desktop_drop: ^0.5.0
  cross_file: ^0.3.4+2
  # Native download: present the OS share sheet on a downloaded attachment so the
  # user can "Save to Files" (iOS) / save to Downloads (Android) or send it on,
  # instead of dumping it in a hidden app directory.
  share_plus: ^11.0.0

  # Voice comments: mic capture + live amplitude (record) and playback (just_audio).
  # Cross-platform (mobile/desktop/web); web plays the audio via a Blob URL.
  record: ^6.1.2
  just_audio: ^0.10.5

  # Comment reactions: full emoji picker (device emoji font) behind the "…" button
  # on the quick-reactions bar.
  emoji_picker_flutter: ^4.3.0
  # Rich clipboard: copy a comment's inline image as real image data (Flutter's
  # built-in Clipboard is text-only). Text comments still copy as text.
  super_clipboard: ^0.9.1

  cupertino_icons: ^1.0.8

  # Icons — Lucide (lucide.dev). Frontend convention: use ONLY these icons,
  # never Material (Icons.*) or Cupertino (CupertinoIcons.*).
  lucide_icons_flutter: ^3.1.14
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/en/
    - assets/i18n/de/
    - assets/branding/
  shaders:
    # Single-pass progressive (graduated) backdrop blur — the iOS-26 header
    # dissolve, sampling the real backdrop via ImageFilter.shader (Impeller).
    - shaders/progressive_blur.frag
  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-Variable.ttf
    - family: IBMPlexSans
      fonts:
        - asset: assets/fonts/IBMPlexSans-Regular.ttf
        - asset: assets/fonts/IBMPlexSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSans-Bold.ttf
          weight: 700
    - family: IBMPlexMono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500

# --- Generated native splash (run: dart run flutter_native_splash:create) ---
# Web + iOS splash come from the animated handoff (Design/handoff) — keep both false,
# otherwise the generator overwrites web/index.html and the iOS storyboard.
flutter_native_splash:
  color: "#F4F3EF"
  color_dark: "#131119"
  image: assets/branding/splash_icon.png
  image_dark: assets/branding/splash_icon_dark.png
  android_12:
    color: "#F4F3EF"
    color_dark: "#131119"
    image: assets/branding/splash_icon.png
    image_dark: assets/branding/splash_icon_dark.png
  web: false
  ios: false

# --- Generated app icons (run: dart run flutter_launcher_icons) ---
flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  macos:
    generate: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#F4F3EF"
  adaptive_icon_foreground: assets/branding/app_icon_foreground.png
  adaptive_icon_monochrome: assets/branding/app_icon_foreground.png
  remove_alpha_ios: true
