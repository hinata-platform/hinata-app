name: Store Release

# Builds & uploads the native apps. Two entry points:
#   1. Push a version tag (v1.2.3)  — the classic trigger.
#   2. Called by the "Release" button workflow (release-button.yml), which bumps
#      the version + creates the tag for you, then invokes this via workflow_call.
# Requires the secrets documented in README.md (Play service account, Apple API
# key, match repo, signing keys).
on:
  push:
    tags: ['v*']
  workflow_call:
    inputs:
      ref:
        description: Git ref (tag) to build. Empty = the triggering tag.
        type: string
        required: false

jobs:
  android:
    name: Android → Play Store (internal track)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: android
      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks
      - name: Write key.properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=../upload-keystore.jks
          EOF
      - name: Set up Rust for native plugins (16 KB page alignment)
        # cargokit_options.yaml forces the Rust native libs (irondash_engine_context,
        # super_native_extensions) to build from source instead of downloading the
        # maintainer's precompiled binaries, which are only 4 KB-aligned and fail
        # Google Play's 16 KB requirement for Android 15+. Rust >= 1.86 aligns the
        # 64-bit aarch64 target to 16 KB by default; the CARGO_ENCODED_RUSTFLAGS
        # (0x1F-separated) additionally aligns the 32-bit armv7 build.
        run: |
          # ubuntu-latest ships rustup; install it as a fallback if a future
          # runner image drops it (cargokit REQUIRES it — precompiled is disabled).
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            source "$HOME/.cargo/env"
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android
          printf 'CARGO_ENCODED_RUSTFLAGS=-C\x1flink-arg=-Wl,-z,max-page-size=16384\x1f-C\x1flink-arg=-Wl,-z,common-page-size=16384\n' >> "$GITHUB_ENV"
      - run: flutter pub get
      - name: Build & upload via Fastlane
        env:
          PLAY_JSON_KEY: ${{ secrets.PLAY_JSON_KEY }}
        run: |
          cd android
          bundle exec fastlane internal

  ios:
    name: iOS → TestFlight
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ios
      - run: flutter pub get
      - name: Build & upload via Fastlane
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: |
          cd ios
          bundle exec fastlane beta

  macos:
    name: macOS → TestFlight (Mac App Store)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: macos
      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - name: Build & upload via Fastlane
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: |
          cd macos
          bundle exec fastlane beta
