name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  quality:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-web:
    name: Build Web
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build web --release
      - uses: actions/upload-artifact@v4
        with:
          name: hinata-web
          path: build/web

  docker:
    name: Publish Web Docker image
    needs: quality
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=bear,enable={{is_default_branch}}
      # White-label web image — NO backend is baked in. The default server is set
      # at deployment via the HINATA_DEFAULT_SERVER container env (see Dockerfile
      # + deploy/docker-entrypoint.d). One image serves every deployment; the
      # :bear tag is now just an alias of the same white-label build (asta + bear
      # differ only by the env each stack's compose sets). Tags: semver (v* tags)
      # + :latest and :bear (main).
      - name: Build & push white-label web image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Redeploy asta + bear (ASTASRV01)
    needs: docker
    # Only on a real push to main — never on tags or PRs (the self-hosted runner
    # has the host docker socket, so it must not run untrusted/fork code).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, astasrv01]
    steps:
      - name: Surgical redeploy of hinata-app (asta + bear)
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Each stack pulls its OWN freshly-built web image and recreates ONLY the
          # app container (--no-deps leaves server + databases untouched). Each
          # compose pins its own image tag, so `pull hinata-app` fetches :latest for
          # asta and :bear for bear. Stack dirs on ASTASRV01:
          #   asta -> /opt/stacks/hinata       (project "hinata",      inline values)
          #   bear -> /opt/stacks/hinata-bear  (project "hinata-bear", loads its .env)
          #
          # WHITE-LABEL: the image bakes NO backend. Each stack's hinata-app service
          # MUST set the server via env, else the app opens the connect screen:
          #   asta compose:  environment: [ "HINATA_DEFAULT_SERVER=https://api.track.asta.hn" ]
          #   bear compose:  environment: [ "HINATA_DEFAULT_SERVER=https://api.track.bear.ahmadre.com" ]
          for STACK in hinata hinata-bear; do
            echo "::group::redeploy $STACK (app)"
            docker run --rm \
              -e GHCR_USER -e GHCR_TOKEN -e STACK="$STACK" \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "/opt/stacks/$STACK:/work" -w /work \
              docker:cli sh -euc '
                echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
                docker compose -p "$STACK" pull hinata-app
                docker compose -p "$STACK" up -d --no-deps --force-recreate hinata-app
                docker logout ghcr.io'
            echo "::endgroup::"
          done
